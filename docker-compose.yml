services:
  db:
    image: postgis/postgis:15-3.3
    container_name: osm_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app_db
    ports:
      - "5435:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d app_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  importer:
    image: ubuntu:22.04
    container_name: osm_importer
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c " export DEBIAN_FRONTEND=noninteractive && apt-get update && apt-get install -y tzdata osm2pgsql postgresql-client wget ca-certificates && echo 'Checking if database is already populated...' && if ! psql -h db -U postgres -d app_db -c 'SELECT 1 FROM planet_osm_point LIMIT 1' 2>/dev/null; then
        echo 'Downloading OSM data for Victoria from Geofabrik...' &&
        wget -q -O /tmp/data.osm.pbf https://download.geofabrik.de/australia-oceania/australia/victoria-latest.osm.pbf &&
        echo 'Enabling hstore extension...' &&
        psql -h db -U postgres -d app_db -c 'CREATE EXTENSION IF NOT EXISTS hstore;' &&
        echo 'Importing OSM data using osm2pgsql. This will take a few minutes...' &&
        osm2pgsql -d app_db -H db -U postgres -c --hstore /tmp/data.osm.pbf &&
        rm /tmp/data.osm.pbf &&
        echo 'Import completed successfully!'
      else
        echo 'OSM data already exists in the database. Skipping import.'
      fi "

volumes:
  db_data:
