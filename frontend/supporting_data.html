<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supporting Data | 20-Minute Neighbourhood Explorer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .map-btn.active {
      background-color: #004071;
      color: #ffffff;
      border-color: #004071;
    }
    #map-frame {
      transition: opacity 0.2s ease;
    }
    #map-frame.loading {
      opacity: 0.35;
    }
  </style>
</head>

<body class="bg-[#F8F9FA] text-slate-900 min-h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-[#004071] text-white px-8 py-4 shadow-lg flex-shrink-0 flex items-center justify-center">
    <nav class="flex items-center gap-6">
      <a href="/" class="text-sm font-bold font-inter uppercase tracking-widest opacity-80 hover:opacity-100 transition-opacity">Home</a>
      <a href="/dashboard.html" class="text-sm font-bold font-inter uppercase tracking-widest opacity-80 hover:opacity-100 transition-opacity">Map</a>
      <a href="/suburb.html" class="text-sm font-bold font-inter uppercase tracking-widest opacity-80 hover:opacity-100 transition-opacity">Suburb Overview</a>
      <a href="/about.html" class="text-sm font-bold font-inter uppercase tracking-widest opacity-80 hover:opacity-100 transition-opacity">About</a>
      <a href="/supporting_data.html" class="text-sm font-bold font-inter uppercase tracking-widest border-b-2 border-white pb-0.5 transition-colors">Supporting Data</a>
    </nav>
  </header>

  <!-- Main Content: sidebar + viewer, fills remaining viewport height -->
  <main class="flex flex-1 overflow-hidden" style="height: calc(100vh - 64px);">

    <!-- Left Panel: Buttons -->
    <aside class="w-52 flex-shrink-0 bg-white border-r border-slate-200 overflow-y-auto flex flex-col">
      <div class="px-4 pt-5 pb-2">
        <p class="text-[10px] font-bold uppercase tracking-widest text-slate-400 font-inter">Select a map</p>
      </div>

      <nav class="px-3 pb-6 space-y-4 flex-1">

        <div>
          <p class="text-[9px] font-bold uppercase tracking-widest text-slate-400 font-inter px-2 mb-1.5">Boundaries</p>
          <div class="space-y-1">
            <button class="map-btn w-full text-left text-xs font-medium font-inter px-3 py-1.5 rounded-md border border-slate-200 text-slate-700 hover:border-[#004071] hover:text-[#004071] transition-all"
              data-src="map_visualisations/a_map_lga.html"
              data-label="LGA Boundaries">LGA Boundaries</button>
            <button class="map-btn w-full text-left text-xs font-medium font-inter px-3 py-1.5 rounded-md border border-slate-200 text-slate-700 hover:border-[#004071] hover:text-[#004071] transition-all"
              data-src="map_visualisations/b_map_suburb.html"
              data-label="Suburb Boundaries">Suburb Boundaries</button>
            <button class="map-btn w-full text-left text-xs font-medium font-inter px-3 py-1.5 rounded-md border border-slate-200 text-slate-700 hover:border-[#004071] hover:text-[#004071] transition-all"
              data-src="map_visualisations/h_melbourne_suburbs_by_ring.html"
              data-label="Melbourne Ring Suburgs by BCARR Classification">BCARR Rings</button>
          </div>
        </div>

        <div>
          <p class="text-[9px] font-bold uppercase tracking-widest text-slate-400 font-inter px-2 mb-1.5">Crime</p>
          <div class="space-y-1">
            <button class="map-btn w-full text-left text-xs font-medium font-inter px-3 py-1.5 rounded-md border border-slate-200 text-slate-700 hover:border-[#004071] hover:text-[#004071] transition-all"
              data-src="map_visualisations/c_map_crime.html"
              data-label="Crime Score by LGA">Crime Score by LGA</button>
          </div>
        </div>

        <div>
          <p class="text-[9px] font-bold uppercase tracking-widest text-slate-400 font-inter px-2 mb-1.5">Housing Prices</p>
          <div class="space-y-1">
            <button class="map-btn w-full text-left text-xs font-medium font-inter px-3 py-1.5 rounded-md border border-slate-200 text-slate-700 hover:border-[#004071] hover:text-[#004071] transition-all"
              data-src="map_visualisations/d_map_house.html"
              data-label="Median House Price">Median House Price</button>
            <button class="map-btn w-full text-left text-xs font-medium font-inter px-3 py-1.5 rounded-md border border-slate-200 text-slate-700 hover:border-[#004071] hover:text-[#004071] transition-all"
              data-src="map_visualisations/e_map_unit.html"
              data-label="Median Unit Price">Median Unit Price</button>
          </div>
        </div>

        <div>
          <p class="text-[9px] font-bold uppercase tracking-widest text-slate-400 font-inter px-2 mb-1.5">Rent Scores</p>
          <div class="space-y-1">
            <button class="map-btn w-full text-left text-xs font-medium font-inter px-3 py-1.5 rounded-md border border-slate-200 text-slate-700 hover:border-[#004071] hover:text-[#004071] transition-all"
              data-src="map_visualisations/f_map_rentScoreAverage.html"
              data-label="Rent Score Average">Rent Score Average</button>
            <button class="map-btn w-full text-left text-xs font-medium font-inter px-3 py-1.5 rounded-md border border-slate-200 text-slate-700 hover:border-[#004071] hover:text-[#004071] transition-all"
              data-src="map_visualisations/g_map_rentScore_Unit_1BR.html"
              data-label="Rent Score — 1BR Flat">1BR Unit</button>
            <button class="map-btn w-full text-left text-xs font-medium font-inter px-3 py-1.5 rounded-md border border-slate-200 text-slate-700 hover:border-[#004071] hover:text-[#004071] transition-all"
              data-src="map_visualisations/g_map_rentScore_Unit_2BR.html"
              data-label="Rent Score — 2BR Flat">2BR Unit</button>
            <button class="map-btn w-full text-left text-xs font-medium font-inter px-3 py-1.5 rounded-md border border-slate-200 text-slate-700 hover:border-[#004071] hover:text-[#004071] transition-all"
              data-src="map_visualisations/g_map_rentScore_Unit_3BR.html"
              data-label="Rent Score — 3BR Flat">3BR Unit</button>
            <button class="map-btn w-full text-left text-xs font-medium font-inter px-3 py-1.5 rounded-md border border-slate-200 text-slate-700 hover:border-[#004071] hover:text-[#004071] transition-all"
              data-src="map_visualisations/g_map_rentScore_House_2BR.html"
              data-label="Rent Score — 2BR House">2BR House</button>
            <button class="map-btn w-full text-left text-xs font-medium font-inter px-3 py-1.5 rounded-md border border-slate-200 text-slate-700 hover:border-[#004071] hover:text-[#004071] transition-all"
              data-src="map_visualisations/g_map_rentScore_House_3BR.html"
              data-label="Rent Score — 3BR House">3BR House</button>
            <button class="map-btn w-full text-left text-xs font-medium font-inter px-3 py-1.5 rounded-md border border-slate-200 text-slate-700 hover:border-[#004071] hover:text-[#004071] transition-all"
              data-src="map_visualisations/g_map_rentScore_House_4BR.html"
              data-label="Rent Score — 4BR House">4BR House</button>
          </div>
        </div>

      </nav>
    </aside>

    <!-- Right Panel: Map Viewer -->
    <div class="flex-1 flex flex-col min-w-0">

      <!-- Title bar -->
      <div class="flex items-center justify-between px-5 py-2.5 bg-white border-b border-slate-200 flex-shrink-0 h-10">
        <span id="map-title" class="text-xs font-semibold text-slate-400 font-inter uppercase tracking-widest">Select a map from the panel</span>
        <a id="open-new-tab" href="#" target="_blank" rel="noopener noreferrer"
          class="hidden items-center gap-1.5 text-[#004071] text-xs font-semibold font-inter hover:underline">
          <i data-lucide="external-link" class="w-3 h-3"></i>
          Open in new tab
        </a>
      </div>

      <!-- Placeholder -->
      <div id="map-placeholder" class="flex-1 flex flex-col items-center justify-center text-slate-300 gap-3">
        <i data-lucide="map" class="w-12 h-12"></i>
        <p class="text-sm font-inter text-slate-400">Choose a map from the left panel.</p>
      </div>

      <!-- iframe fills the rest -->
      <iframe id="map-frame"
        class="hidden flex-1 w-full border-0"
        src=""
        title="Map viewer">
      </iframe>

    </div>
  </main>

  <script>
    lucide.createIcons();

    const buttons = document.querySelectorAll('.map-btn');
    const frame = document.getElementById('map-frame');
    const placeholder = document.getElementById('map-placeholder');
    const titleEl = document.getElementById('map-title');
    const openLink = document.getElementById('open-new-tab');

    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        const src = btn.dataset.src;
        const label = btn.dataset.label;

        // Active state
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        // Update title bar
        titleEl.textContent = label;
        titleEl.classList.remove('text-slate-400');
        titleEl.classList.add('text-slate-600');
        openLink.href = '/' + src;
        openLink.classList.remove('hidden');
        openLink.classList.add('flex');

        // Swap placeholder for iframe
        placeholder.classList.add('hidden');
        frame.classList.remove('hidden');
        frame.classList.add('flex', 'loading');
        frame.onload = () => frame.classList.remove('loading');
        frame.src = '/' + src;
      });
    });
  </script>
</body>
</html>
