<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>20-Min Neighbourhood | Map</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Full-viewport layout — nothing overflows the page */
    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    #page-shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #view-home {
      flex: 1;
      display: flex;
      gap: 2rem;
      padding: 1.5rem 2rem;
      overflow: hidden;
      min-height: 0;
    }

    /* Sidebars scroll independently */
    .sidebar {
      width: 17rem;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      overflow-y: auto;
      min-height: 0;
    }

    /* Centre column fills remaining width */
    #centre-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      min-height: 0;
      min-width: 0;
    }

    /* Map grows to fill all remaining vertical space */
    #map-wrapper {
      flex: 1;
      position: relative;
      min-height: 0;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* Score badge in history items */
    .history-score {
      flex-shrink: 0;
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: 11px;
      color: #004071;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 9999px;
      padding: 1px 7px;
      white-space: nowrap;
    }
  </style>
</head>

<body class="bg-slate-50 text-slate-900">

  <div id="page-shell">

    <header class="bg-[#004071] text-white px-8 py-4 shadow-lg flex-shrink-0 flex items-center justify-center">
      <nav class="flex gap-6 text-sm font-bold font-inter uppercase tracking-widest">
        <a href="/" class="hover:text-blue-200 transition-colors opacity-80 hover:opacity-100">Home</a>
        <a href="/dashboard.html" class="hover:text-blue-200 transition-colors border-b-2 border-white pb-0.5">Map</a>
        <a href="/suburb.html" class="hover:text-blue-200 transition-colors opacity-80 hover:opacity-100">Suburb
          Overview</a>
        <a href="/about.html" class="hover:text-blue-200 transition-colors opacity-80 hover:opacity-100">About</a>
      </nav>
    </header>

    <!-- MAIN DASHBOARD -->
    <div id="view-home">

      <!-- Left Sidebar: Filters -->
      <aside class="sidebar">
        <div class="bg-white rounded-xl border border-slate-200 p-5 custom-shadow flex-shrink-0">
          <div
            class="flex items-center gap-2 mb-4 text-slate-500 uppercase tracking-widest text-[11px] font-bold font-inter">
            <i data-lucide="sliders-horizontal" class="w-3.5 h-3.5"></i>
            Service Filters
          </div>
          <div id="filter-container" class="space-y-1"></div>
        </div>
      </aside>

      <!-- Centre Column: Search + Map -->
      <div id="centre-col">
        <!-- Search -->
        <div class="bg-white rounded-xl border border-slate-200 p-4 custom-shadow relative flex-shrink-0">
          <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest font-inter mb-2">Address
            Search</label>
          <div class="relative">
            <input id="query" type="text" placeholder="Start typing a Melbourne address..."
              class="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-[#004071] focus:border-[#004071] transition-all outline-none font-inter text-sm" />
            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
          </div>
          <ul id="results"
            class="hidden absolute left-6 right-6 z-[100] mt-1 border border-slate-200 rounded-lg shadow-2xl divide-y divide-slate-50 overflow-hidden bg-white max-h-60 overflow-y-auto">
          </ul>
        </div>

        <!-- Map (grows to fill) -->
        <div id="map-wrapper" class="bg-white rounded-xl border border-slate-200 custom-shadow overflow-hidden">
          <div id="progress-bar"
            class="absolute top-0 left-0 h-1 bg-blue-500 z-50 transition-all duration-300 opacity-0 w-0"></div>
          <div id="alert-container" class="absolute top-4 right-4 z-[100] flex flex-col gap-2 w-64 pointer-events-none">
          </div>
          <div id="map"></div>
        </div>
      </div>

      <!-- Right Sidebar: History + Score -->
      <aside class="sidebar">
        <!-- Recent Searches -->
        <div class="bg-white rounded-xl border border-slate-200 p-5 custom-shadow">
          <div
            class="flex items-center gap-2 mb-4 text-slate-500 uppercase tracking-widest text-[11px] font-bold font-inter">
            <i data-lucide="history" class="w-3.5 h-3.5"></i>
            Recent Searches
          </div>
          <div id="history-list" class="space-y-2">
            <p class="text-center py-4 text-slate-400 text-xs font-inter">No recent searches</p>
          </div>
        </div>

        <!-- Personalised Score -->
        <div class="bg-white rounded-xl border border-slate-200 p-6 custom-shadow">
          <div
            class="flex items-center gap-2 mb-5 text-slate-500 uppercase tracking-widest text-[11px] font-bold font-inter">
            <i data-lucide="activity" class="w-3.5 h-3.5"></i>
            Your Score
          </div>
          <div class="text-center">
            <div id="score-value" class="text-6xl font-black text-[#004071] mb-2">--</div>
            <div class="text-[10px] font-bold text-slate-400 tracking-[0.2em] mb-4 uppercase font-inter">
              Based on selected filters
            </div>
            <div class="h-2 w-full bg-slate-100 rounded-full overflow-hidden mb-4">
              <div id="score-bar" class="h-full bg-emerald-500 w-0 transition-all duration-1000"></div>
            </div>
            <p id="score-desc" class="text-xs text-slate-500 font-medium leading-relaxed italic">
              Search an address and select your services.
            </p>
          </div>
          <div class="mt-5 pt-4 border-t border-slate-100">
            <div class="text-[10px] font-bold text-slate-400 tracking-[0.2em] uppercase font-inter mb-3 text-center">Why
              this score?</div>
            <div id="score-breakdown" class="space-y-2">
              <p class="text-xs text-slate-400 text-center">Search an address to see coverage.</p>
            </div>
            <p id="score-threshold-note" class="mt-3 text-[11px] text-slate-400 text-center font-inter">
              Threshold: 800m walking distance
            </p>
          </div>
        </div>
      </aside>
    </div>

  </div><!-- /page-shell -->

  <script src="script.js" defer></script>
</body>

</html>
